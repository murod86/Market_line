<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512' width='512' height='512'>
  <defs>
    <linearGradient id='bgGrad' x1='10%' y1='0%' x2='90%' y2='100%'>
      <stop offset='0%' stop-color='#4f8ef7'/>
      <stop offset='50%' stop-color='#3b7de8'/>
      <stop offset='100%' stop-color='#2563d4'/>
    </linearGradient>
    <filter id='mShadow' x='-5%' y='-5%' width='115%' height='120%'>
      <feDropShadow dx='0' dy='3' stdDeviation='5' flood-color='rgba(0,0,0,0.30)'/>
    </filter>
  </defs>

  <!-- Blue rounded square background -->
  <rect x='0' y='0' width='512' height='512' rx='112' ry='112' fill='url(#bgGrad)'/>

  <!-- Subtle inner highlight at top -->
  <rect x='0' y='0' width='512' height='200' rx='112' ry='112' fill='rgba(255,255,255,0.07)'/>

  <!-- White M letter with black stroke and drop shadow -->
  <text
    x='256'
    y='380'
    font-family='Arial Black, Helvetica Neue, Arial, sans-serif'
    font-weight='900'
    font-size='360'
    text-anchor='middle'
    fill='white'
    stroke='rgba(0,0,0,0.22)'
    stroke-width='8'
    stroke-linejoin='round'
    paint-order='stroke'
    filter='url(#mShadow)'
  >M</text>
</svg>